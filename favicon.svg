<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background with neon border -->
  <rect x="5" y="5" width="90" height="90" rx="20" fill="#0d0d12" stroke="#863bff" stroke-width="5" />
  
  <!-- Grid Lines -->
  <line x1="36" y1="15" x2="36" y2="85" stroke="#2a2a35" stroke-width="4" stroke-linecap="round" />
  <line x1="64" y1="15" x2="64" y2="85" stroke="#2a2a35" stroke-width="4" stroke-linecap="round" />
  <line x1="15" y1="36" x2="85" y2="36" stroke="#2a2a35" stroke-width="4" stroke-linecap="round" />
  <line x1="15" y1="64" x2="85" y2="64" stroke="#2a2a35" stroke-width="4" stroke-linecap="round" />
  
  <!-- Glowing O in the middle -->
  <circle cx="50" cy="50" r="10" fill="none" stroke="#ff007f" stroke-width="6" />
  
  <!-- Glowing X in top-left -->
  <line x1="20" y1="20" x2="30" y2="30" stroke="#00f0ff" stroke-width="6" stroke-linecap="round" />
  <line x1="30" y1="20" x2="20" y2="30" stroke="#00f0ff" stroke-width="6" stroke-linecap="round" />
</svg>